  :root {
    --bg: #0a0a0f;
    --card: #12121c;
    --card-home: #161625;
    --card-away: #1a1318;
    --accent: #c8aa5a;
    --accent-dim: #9a7e3a;
    --home-tag: #2a6a3a;
    --away-tag: #7a2a2a;
    --text: #e8e4dc;
    --text-dim: #8a8680;
    --border: #2a2a36;
    --venue-boondall: #3a5a7a;
    --venue-acacia: #5a6a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- HEADER --- */
  .header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 600px 300px at 50% 0%, rgba(200,170,90,0.08), transparent),
      repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(200,170,90,0.015) 80px, rgba(200,170,90,0.015) 81px);
    pointer-events: none;
  }

  .header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(200,170,90,0.15);
    position: relative;
  }

  .header .subtitle {
    font-family: 'Oswald', sans-serif;
    font-weight: 400;
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Oswald', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* --- DIVIDER --- */
  .divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    margin: 0 auto;
  }

  /* --- VENUE STATS --- */
  .venue-stats {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 16px;
  }

  .venue-stat {
    display: flex;
    align-items: center;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: rgba(255, 255, 255, 0.02);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .venue-stat .venue-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 6px;
  }

  .venue-stat .venue-dot.boondall { background: var(--venue-boondall); }
  .venue-stat .venue-dot.acacia { background: var(--venue-acacia); }

  .venue-stat-num {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    color: var(--text);
    margin-right: 4px;
    font-size: 0.8rem;
  }

  /* --- SCHEDULE --- */
  .schedule {
    max-width: 740px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .month-group {
    margin-bottom: 36px;
  }

  .month-label {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-bottom: 14px;
    padding-left: 4px;
  }

  .game-card {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 0 18px;
    align-items: center;
    padding: 16px 20px;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
    position: relative;
  }

  .game-card:hover {
    border-color: var(--accent-dim);
  }

  .game-wrap:hover {
    transform: translateX(3px);
  }

  .game-card.home { background: var(--card-home); }
  .game-card.away { background: var(--card-away); }

  .game-date {
    text-align: center;
  }

  .game-date .day-num {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    line-height: 1;
    color: var(--text);
  }

  .game-date .day-name {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .game-info {
    min-width: 0;
  }

  .game-opponent {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: 0.02em;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 3px;
    line-height: 1.6;
  }

  .tag-home { background: var(--home-tag); color: #a8e8b8; }
  .tag-away { background: var(--away-tag); color: #e8a8a8; }

  .game-venue {
    font-size: 0.75rem;
    color: var(--text-dim);
  }

  .game-venue .venue-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  .venue-boondall .venue-dot { background: var(--venue-boondall); }
  .venue-acacia .venue-dot { background: var(--venue-acacia); }

  .game-time {
    text-align: right;
    white-space: nowrap;
  }

  .game-time .time-start {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 1.05rem;
    color: var(--text);
  }

  .game-time .time-end {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* --- PAST GAME STYLING --- */
  .game-card.past {
    opacity: 0.65;
  }
  .game-card.past:hover {
    opacity: 0.85;
  }

  /* --- EXPANDABLE GOAL DETAILS --- */
  .game-wrap {
    margin-bottom: 6px;
    animation: fadeSlide 0.4s ease both;
    transition: transform 0.15s;
    position: relative;
  }

  .game-wrap[id^="game-"] {
    scroll-margin-top: 32px;
    scroll-margin-bottom: 64px;
  }

  .game-wrap .game-card {
    margin-bottom: 0;
  }

  .game-wrap.expanded .game-card {
    border-radius: 8px 8px 0 0;
    border-bottom: none;
  }

  .game-wrap.expanded .game-card.past {
    opacity: 0.95;
  }

  .game-card.has-goals-toggle {
    cursor: pointer;
    user-select: none;
    padding-bottom: 10px;
  }

  .game-card.has-goals-toggle:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .game-card.has-goals-toggle:focus:not(:focus-visible) {
    outline: none;
  }

  .game-toggle-hint {
    grid-column: 1 / -1;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-dim);
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    line-height: 1.1;
  }

  .game-toggle-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .game-moments-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #b8e4ff;
    border: 1px solid rgba(120, 200, 255, 0.55);
    border-radius: 999px;
    padding: 2px 8px;
    background: linear-gradient(135deg, rgba(80, 170, 255, 0.22), rgba(120, 200, 255, 0.1));
    box-shadow: 0 0 10px rgba(100, 190, 255, 0.22);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .game-moments-tag .moment-media-icon {
    display: block;
    flex-shrink: 0;
  }

  .game-moments-tag .moment-media-icon + .moment-media-icon {
    margin-left: -1px;
  }

  .game-media-part {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .game-media-sep {
    text-transform: none;
    opacity: 0.85;
  }

  .game-card.has-goals-toggle:hover .game-moments-tag,
  .game-card.has-goals-toggle:focus-visible .game-moments-tag {
    border-color: rgba(160, 220, 255, 0.75);
    box-shadow: 0 0 14px rgba(120, 200, 255, 0.35);
  }

  .game-toggle-hint .chevron {
    font-size: 0.48rem;
    color: var(--accent);
    transition: transform 0.2s ease;
    opacity: 0.9;
  }

  .game-wrap.expanded .game-toggle-hint .chevron {
    transform: rotate(180deg);
  }

  .game-goals-panel {
    display: none;
    padding: 4px 20px 8px 20px;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    background: rgba(0, 0, 0, 0.35);
  }

  .game-goals-panel.open {
    display: block;
  }

  .game-goals-panel h4 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 12px 0 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-shadow: 0 0 16px rgba(200, 170, 90, 0.18);
  }

  .game-goals-panel h4::before {
    content: '';
    width: 10px;
    height: 2px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  }

  .period-header {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    color: var(--accent);
    margin: 6px 0 6px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    padding-bottom: 2px;
  }

  .goal-line {
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
    padding: 8px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .goal-line .moment-line.moment-attached {
    margin-top: 6px;
    padding: 6px 0 2px 12px;
    border-left: 2px solid rgba(158, 200, 232, 0.28);
    border-bottom: none;
    scroll-margin-top: 48px;
    scroll-margin-bottom: 24px;
  }

  .goal-line .moment-line.moment-attached .goal-meta {
    margin-bottom: 2px;
  }

  .goal-line:last-child {
    border-bottom: none;
  }

  .goal-meta {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .goal-meta .goal-time {
    flex-shrink: 0;
  }

  .goal-meta-end {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-shrink: 0;
    margin-left: auto;
  }

  .goal-meta .badges {
    color: var(--accent);
    font-weight: 600;
  }

  .goal-meta .goal-score {
    padding: 2px 8px;
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-size: 0.68rem;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(200, 170, 90, 0.08);
    flex-shrink: 0;
  }

  .goal-meta .score-jersey {
    width: 14px;
    height: 14px;
    vertical-align: middle;
    margin-right: 2px;
    border-radius: 2px;
  }

  .goal-meta .score-sep {
    color: var(--text-dim);
    font-weight: 400;
    margin: 0 2px;
  }

  .goal-scorer {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
  }

  .goal-assist {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .goal-placeholder {
    font-size: 0.82rem;
    color: var(--text-dim);
    line-height: 1.5;
    padding: 4px 0 8px;
  }

  .moment-line {
    font-size: 0.85rem;
    line-height: 1.45;
    color: var(--text);
    padding: 8px 0 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    scroll-margin-top: 48px;
    scroll-margin-bottom: 24px;
  }

  .moment-line.moment-highlight {
    animation: momentFlash 1.6s ease;
  }

  @keyframes momentFlash {
    0%, 100% { background: transparent; }
    20%, 60% { background: rgba(200, 170, 90, 0.1); }
  }

  .moment-line:last-child {
    border-bottom: none;
  }

  .period-break {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed rgba(255, 255, 255, 0.1);
  }

  .period-break .moment-line {
    border-bottom: none;
    padding-top: 4px;
  }

  .moment-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .moment-header-start {
    display: flex;
    align-items: baseline;
    gap: 8px;
    min-width: 0;
    flex: 1;
  }

  .moment-header-start .goal-time {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .moment-badge {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #9ec8e8;
    border: 1px solid rgba(158, 200, 232, 0.35);
    border-radius: 3px;
    padding: 1px 6px;
    background: rgba(158, 200, 232, 0.08);
  }

  .moment-share-btn {
    padding: 0;
    border: none;
    background: transparent;
    color: var(--text-dim);
    opacity: 0.35;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: opacity 0.15s, color 0.15s;
  }

  .moment-share-btn:hover,
  .moment-share-btn:focus-visible {
    opacity: 0.85;
    color: var(--accent);
  }

  .moment-share-btn.copied {
    opacity: 0.75;
    color: var(--accent);
  }

  .moment-desc {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 2px;
    font-style: italic;
  }

  .moment-clip-wrap {
    position: relative;
    display: inline-block;
    width: 100%;
    max-width: 320px;
    margin-top: 8px;
    transition: max-width 0.2s ease;
  }

  .moment-clip-wrap.expanded {
    max-width: 100%;
  }

  .moment-clip {
    display: block;
    width: 100%;
    max-width: 320px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: #000;
    transition: max-width 0.2s ease;
  }

  .moment-clip-wrap.expanded .moment-clip {
    max-width: 100%;
  }

  .moment-expand-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    padding: 4px;
    border: none;
    border-radius: 4px;
    background: rgba(0, 0, 0, 0.55);
    color: var(--text-dim);
    opacity: 0.65;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
  }

  .moment-expand-btn:hover,
  .moment-expand-btn:focus-visible {
    opacity: 1;
    color: var(--accent);
    background: rgba(0, 0, 0, 0.75);
  }

  .moment-clip-wrap.expanded .moment-expand-icon {
    display: none;
  }

  .moment-clip-wrap:not(.expanded) .moment-collapse-icon {
    display: none;
  }

  @media (max-width: 520px) {
    /* Bigger tap target on phones, and tapping the video itself goes fullscreen. */
    .moment-expand-btn {
      padding: 6px;
      opacity: 0.85;
    }
    video.moment-clip {
      cursor: pointer;
    }
  }

  .moment-photo {
    cursor: zoom-in;
  }

  .photo-lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: rgba(0, 0, 0, 0.9);
    cursor: zoom-out;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  .photo-lightbox.open {
    display: flex;
    opacity: 1;
  }

  .photo-lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 10px 50px rgba(0, 0, 0, 0.6);
    cursor: default;
    transition: filter 0.3s ease;

let nextGameIdx = -1;
for (let i = 0; i < games.length; i++) {
  if (games[i].score) {
    const { dk, opp } = games[i].score;
    goalsFor += dk;
    goalsAgainst += opp;
    if (dk > opp) wins++;
    else if (dk < opp) losses++;
    else ties++;
  } else {
    gamesRemaining++;
    if (games[i].ha === 'home') homeRemaining++;
    else awayRemaining++;
    
    if (games[i].vclass === 'venue-boondall') boondallRemaining++;
    else if (games[i].vclass === 'venue-acacia') acaciaRemaining++;
  }

  const gd = new Date(games[i].date + 'T00:00:00');
  if (gd >= today && !games[i].score && nextGameIdx === -1) { 
    nextGameIdx = i; 
  }
}

// Pre-compute running goal/assist/moment season totals (games are already in chronological order)
const _goalRunning = {};
const _assistRunning = {};
const _momentRunning = {};
games.forEach(g => {
  if (g.dkGoals) {
    g.dkGoals.forEach(goal => {
      _goalRunning[goal.scorer] = (_goalRunning[goal.scorer] || 0) + 1;
      goal._goalTotal = _goalRunning[goal.scorer];
      goal._assistTotals = {};
      (goal.assists || []).forEach(a => {
        _assistRunning[a] = (_assistRunning[a] || 0) + 1;
        goal._assistTotals[a] = _assistRunning[a];
      });
    });
  }
  if (g.customMoments) {
    g.customMoments.forEach((moment, i) => {
      if (!moment.id) {
        moment.id = `${moment.period}-${String(moment.time).replace(':', '')}-${i}`;
      }
      moment._momentId = moment.id;

    });

function displayPlayerName(name) {
  if (!name || typeof name !== 'string') return name;
  const normalized = name.replace(/^Mathew(\s+)/i, 'Mat$1');
  return PLAYER_ALIASES[normalized] || PLAYER_ALIASES[name] || normalized;
}

function assistPhrase(assists) {
  if (!assists || assists.length === 0) return null;
  return assists.map(displayPlayerName).join(', ');
}

function assistPhraseWithTotals(assists, totals) {
  if (!assists || assists.length === 0) return null;
  return assists.map(a => `${displayPlayerName(a)} <span class="running-total">(${totals[a]})</span>`).join(', ');
}

function boxScoreTeamLabel(team, game) {
  if (team.isDarkKnights) return 'Dark Knights';
  return game.opp || team.name.replace(/^(Buccaneers|Stars)\s+/, '');
}

const OPPONENT_SHORT_NAMES = {
  'Rhinos': 'Rhi',
  'Sea Dogs': 'Sea',
  'Old Timers': 'OT',
  'Dragons': 'Dra',
  'Puckers': 'Puc',
  'Drop Bears': 'Bears',
};

function fallbackShortName(name) {
  if (!name) return 'Opp';
  const words = name.trim().split(/\s+/);
  if (words.length >= 2) return words.map(w => w[0]).join('').slice(0, 4);
  return name.slice(0, 4);
}

function opponentShortName(game) {
  if (game.opp && OPPONENT_SHORT_NAMES[game.opp]) return OPPONENT_SHORT_NAMES[game.opp];
  if (!game.opp && game.boxScore?.teams) {
    const oppTeam = game.boxScore.teams.find(t => !t.isDarkKnights);
    if (oppTeam) {
      const label = boxScoreTeamLabel(oppTeam, game);
      return OPPONENT_SHORT_NAMES[label] || fallbackShortName(label);
    }
  }
  return fallbackShortName(game.opp || '');
}

function parseScoreAtTime(scoreAtTime, game) {
  const parts = scoreAtTime.split(/,\s*/).map(p => {
    const m = p.trim().match(/^([A-Za-z]+)\s+(\d+)$/);
    return m ? { abbr: m[1], num: m[2] } : null;
  }).filter(Boolean);
  if (parts.length !== 2) return { dkNum: null, oppNum: null };
  const bothBuc = parts.every(p => /^Buc/i.test(p.abbr));
  if (bothBuc) {
    const teams = game?.boxScore?.teams;
    if (teams && teams.length >= 2) {
      const dkIdx = teams.findIndex(t => t.isDarkKnights);
      const oppIdx = dkIdx === 0 ? 1 : 0;
      if (dkIdx !== -1) {
        return { dkNum: parts[dkIdx].num, oppNum: parts[oppIdx].num };
      }
    }
    return { dkNum: parts[1].num, oppNum: parts[0].num };
  }
  const dkPart = parts.find(p => /^Buc/i.test(p.abbr));
  const oppPart = parts.find(p => !/^Buc/i.test(p.abbr));
  return {
    dkNum: dkPart ? dkPart.num : null,
    oppNum: oppPart ? oppPart.num : null,
  };
}

  const t = String(time);
  if (t.toLowerCase() === 'pregame') return Number.POSITIVE_INFINITY;
  const parts = t.split(':').map(Number);
  return (parts[0] || 0) * 60 + (parts[1] || 0);
}

  const key = goalEventKey(goal.period, goal.time);
  return (g.customMoments || []).filter((moment) =>
    moment.attachedToGoal &&
    goalEventKey(moment.attachedToGoal.period, moment.attachedToGoal.time) === key
  );
}

function buildPeriodTimeline(g) {
  const periods = {};
  for (const goal of g.dkGoals || []) {
    if (!periods[goal.period]) periods[goal.period] = [];
    periods[goal.period].push({ kind: 'goal', time: goal.time, goal });
  }
  for (const moment of g.customMoments || []) {
    if (moment.attachedToGoal || moment.afterPeriod) continue;
    if (!periods[moment.period]) periods[moment.period] = [];
    periods[moment.period].push({ kind: 'moment', time: moment.time, moment });
  }
  for (const period of Object.keys(periods)) {
    periods[period].sort((a, b) => hockeyTimeSeconds(b.time) - hockeyTimeSeconds(a.time));
  }
  return periods;
}

// Moment clips load lazily (preload="none"), so a panel with many clips would
// otherwise fire .play() on all of them at once and saturate the connection —
// they all stall, then pop in together. Instead we load them sequentially in
// top-to-bottom order, a couple at a time, and only once they enter the
// viewport. Each clip that starts playing frees a slot for the next one down.
const MOMENT_CLIP_CONCURRENCY = 2;
let _momentClipLoading = 0;
const _momentClipQueue = [];

function _dequeueMomentClip(video) {
  const i = _momentClipQueue.indexOf(video);
  if (i >= 0) _momentClipQueue.splice(i, 1);
}

function _pumpMomentClips() {
  // Keep the queue in document order so clips start top-to-bottom.
  _momentClipQueue.sort((a, b) =>
    (a.compareDocumentPosition(b) & Node.DOCUMENT_POSITION_FOLLOWING) ? -1 : 1);
  while (_momentClipLoading < MOMENT_CLIP_CONCURRENCY && _momentClipQueue.length) {
    const video = _momentClipQueue.shift();
    if (video.dataset.clipState !== 'queued') continue;
    video.dataset.clipState = 'loading';
    _momentClipLoading++;
    const done = () => {
      video.removeEventListener('playing', done);
      video.removeEventListener('error', done);
      if (video.dataset.clipState === 'loading') video.dataset.clipState = 'ready';
      _momentClipLoading--;
      _pumpMomentClips();
    };
    video.addEventListener('playing', done, { once: true });
    video.addEventListener('error', done, { once: true });
    video.play().catch(() => done());
  }
}

function _queueMomentClip(video) {
  const state = video.dataset.clipState;
  if (state === 'ready' || state === 'loading') {
    video.play().catch(() => {});
    return;
  }
  if (state === 'queued') return;
  video.dataset.clipState = 'queued';
  _momentClipQueue.push(video);
  _pumpMomentClips();
}

const momentClipObserver = ('IntersectionObserver' in window)
  ? new IntersectionObserver((entries) => {
      for (const entry of entries) {
        const video = entry.target;
        if (entry.isIntersecting) {
          _queueMomentClip(video);
        } else if (video.dataset.clipState === 'queued') {
          // Scrolled away before it got a turn — drop it back out of the queue.
          video.dataset.clipState = '';
          _dequeueMomentClip(video);
        } else {
          video.pause();
        }
      }
    }, { rootMargin: '300px 0px', threshold: 0.01 })
  : null;

function setMomentClipsPlaying(panel, playing) {
  if (playing) {
    // Photos are tiny; load them as soon as the game is opened.
    panel.querySelectorAll('img.moment-photo[data-src], img.gallery-thumb-img[data-src]').forEach((img) => {
      img.src = img.dataset.src;
      img.removeAttribute('data-src');
    });
  }
  panel.querySelectorAll('video.moment-clip').forEach((video) => {
    if (playing) {
      if (momentClipObserver) momentClipObserver.observe(video);
      else video.play().catch(() => {});
    } else {
      if (momentClipObserver) momentClipObserver.unobserve(video);
      if (video.dataset.clipState === 'queued') {
        video.dataset.clipState = '';
        _dequeueMomentClip(video);
      }
      video.pause();
    }
  });
}

function buildGoalsPanel(g) {
  const panel = document.createElement('div');
  panel.className = 'game-goals-panel';
  panel.id = `goals-${g.date}`;
  panel.setAttribute('role', 'region');
  let html = buildBoxScoreSummaryHtml(g);

  const hasGoals = g.dkGoals && g.dkGoals.length > 0;
  const hasMoments = g.customMoments && g.customMoments.length > 0;
  const hasGallery = g.gallery && g.gallery.length > 0;
  if (!hasGoals && !hasMoments && !hasGallery) {
    panel.innerHTML = html + '<p class="goal-placeholder">Goal-by-goal scoring for Dark Knights is not listed for this game yet. Check the official BIHL box score on the league site.</p>' + buildPhotoCreditHtml(g);
    return panel;
  }

  const periods = buildPeriodTimeline(g);

  if (html) html += goalsSectionHeading(g);

  for (const period of ["Pregame", "1st", "2nd", "3rd", "OT", "SO"]) {
    if (!periods[period]) continue;
    html += `<div class="period-header">${period === 'Pregame' ? 'Pregame' : `${period} Period`}</div>`;
    for (const event of periods[period]) {
      html += event.kind === 'goal'
        ? buildGoalLineHtml(g, event.goal)
        : buildMomentLineHtml(g, event.moment);
    }
    const afterPeriodMoments = (g.customMoments || []).filter((m) => m.afterPeriod === period);
    if (afterPeriodMoments.length) {
      html += '<div class="period-break">';
      for (const moment of afterPeriodMoments) {
        html += buildMomentLineHtml(g, moment);
      }
      html += '</div>';
    }
  }

  html += buildGalleryHtml(g);
  html += buildPhotoCreditHtml(g);

  panel.innerHTML = html;
  attachMomentShareButtons(panel, g);
  attachMomentExpandButtons(panel);
  attachGalleryButtons(panel, g);
  return panel;
}

// A game's photo gallery — a grid of thumbnails that open in the lightbox.
function buildGalleryHtml(g) {
  const photos = g.gallery || [];
  if (!photos.length) return '';
  const label = photos.length === 1 ? '1 Photo' : `${photos.length} Photos`;
  const thumbs = photos.map((src, i) =>
    `<button type="button" class="gallery-thumb" data-full="${photoFullSrc(src)}" data-fallback="${src}" data-photo-id="${mediaBaseName(src)}" aria-label="View photo ${i + 1} of ${photos.length}"><img class="gallery-thumb-img" data-src="${photoThumbSrc(src)}" data-fallback="${src}" onerror="this.onerror=null;this.src=this.dataset.fallback" alt="Game photo ${i + 1}" loading="lazy"></button>`
  ).join('');
  return `<div class="moment-gallery" id="gallery-${g.date}"><div class="moment-gallery-heading">${MOMENT_PHOTO_ICON}<span>${label}</span></div><div class="moment-gallery-grid">${thumbs}</div></div>`;
}

function attachGalleryButtons(panel, g) {
  const thumbs = [...panel.querySelectorAll('.gallery-thumb')];
  const items = buildGalleryLightboxItems(g);
  thumbs.forEach((btn, i) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      // Refresh the thumb (it may have loaded since render) for the blur-up.
      const img = btn.querySelector('img');
      items[i].thumb = img?.currentSrc || img?.getAttribute('src') || items[i].thumb;
      openPhotoLightbox(items, null, i);
    });
  });
}

// Goals section heading when goal list follows box score summary
function goalsSectionHeading(g) {
  const hasMoments = g.customMoments && g.customMoments.length > 0;
  return `<h4>${hasMoments ? 'Scoring & Highlights' : 'Dark Knights Goals'}</h4>`;
}

const SITE_SHARE_ORIGIN = 'https://darkknights.com.au';

function shareBaseUrl() {
  if (location.protocol === 'file:' || location.protocol === 'blob:') {
    return SITE_SHARE_ORIGIN;
  }
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    return SITE_SHARE_ORIGIN;
  }
  return location.origin;
}

function gameShareUrl(date) {
  const base = shareBaseUrl();
  return `${base}/?game=${date}#game-${date}`;
}

function momentShareUrl(date, momentId) {
  const base = shareBaseUrl();
  return `${base}/?game=${date}&moment=${momentId}#moment-${momentId}`;
}

function galleryPhotoShareUrl(date, photoId) {
  const base = shareBaseUrl();
  return `${base}/?game=${date}&photo=${photoId}#photo-${photoId}`;
}

function galleryPhotoId(src) {
  return mediaBaseName(src);
}

function getSharedGameDate() {
  const params = new URLSearchParams(location.search);
  const fromQuery = params.get('game');
  if (fromQuery && /^\d{4}-\d{2}-\d{2}$/.test(fromQuery)) return fromQuery;
  const match = location.hash.match(/game-(\d{4}-\d{2}-\d{2})/);
  return match ? match[1] : null;
}

function getSharedMomentId() {
  const params = new URLSearchParams(location.search);
  const fromQuery = params.get('moment');
  if (fromQuery && /^[a-z0-9-]+$/i.test(fromQuery)) return fromQuery;
  const match = location.hash.match(/moment-([a-z0-9-]+)/i);
  return match ? match[1] : null;
}

function getSharedPhotoId() {
  const params = new URLSearchParams(location.search);
  const fromQuery = params.get('photo');
  if (fromQuery && /^[a-z0-9-]+$/i.test(fromQuery)) return fromQuery;
  const match = location.hash.match(/photo-([a-z0-9-]+)/i);
  return match ? match[1] : null;
}

function findGameDateForMoment(momentId) {
  const game = games.find((g) =>
    (g.customMoments || []).some((m) => m._momentId === momentId || m.id === momentId)
  );
  return game?.date || null;
}

function findGameDateForGalleryPhoto(photoId) {
  const game = games.find((g) =>
    (g.gallery || []).some((src) => galleryPhotoId(src) === photoId)
  );
  return game?.date || null;
}

function buildGalleryLightboxItems(g) {
  return (g.gallery || []).map((src, i) => ({
    src: photoFullSrc(src),
    fallback: src,
    thumb: photoThumbSrc(src),
    alt: `Game photo ${i + 1}`,
    gameDate: g.date,
    photoId: galleryPhotoId(src),
  }));
}

function attachMomentShareButtons(panel, g) {
  panel.querySelectorAll('.moment-share-btn').forEach((btn) => {
    const momentId = btn.dataset.momentId;
    const moment = (g.customMoments || []).find((m) => m._momentId === momentId);
    if (!moment) return;
    btn.addEventListener('click', (e) => shareMoment(e, g, moment, btn));
  });
}

function closePhotoLightbox() {
  const lb = document.getElementById('photo-lightbox');
  if (!lb) return;
  lb.classList.remove('open');
  document.body.style.overflow = '';
}

function getPhotoLightbox() {
  let lb = document.getElementById('photo-lightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'photo-lightbox';
    lb.className = 'photo-lightbox';
    lb.setAttribute('role', 'dialog');
    lb.setAttribute('aria-modal', 'true');
    lb.innerHTML =
      '<button type="button" class="photo-lightbox-close" aria-label="Close photo">&times;</button>' +
      '<button type="button" class="photo-lightbox-share" aria-label="Share photo" title="Share photo"><svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" d="M6.2 9.1a2.6 2.6 0 0 0 3.7 0l1.5-1.5a2.6 2.6 0 0 0-3.7-3.7L6.7 4.4M9.8 6.9a2.6 2.6 0 0 0-3.7 0L4.6 8.4a2.6 2.6 0 0 0 3.7 3.7l.9-.9"/></svg></button>' +
      '<button type="button" class="photo-lightbox-nav prev" aria-label="Previous photo"><svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="M15 5l-7 7 7 7"/></svg></button>' +
      '<img alt="">' +
      '<button type="button" class="photo-lightbox-nav next" aria-label="Next photo"><svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg></button>' +
      '<div class="photo-lightbox-counter"></div>';
    document.body.appendChild(lb);
    lb.addEventListener('click', (e) => {
      if (e.target.closest('.photo-lightbox-share')) {
        e.stopPropagation();
        shareCurrentLightboxPhoto(lb.querySelector('.photo-lightbox-share'));
        return;
      }
      if (e.target === lb || e.target.closest('.photo-lightbox-close')) { closePhotoLightbox(); return; }
      if (e.target.closest('.photo-lightbox-nav.prev')) { e.stopPropagation(); stepPhotoLightbox(-1); }
      else if (e.target.closest('.photo-lightbox-nav.next')) { e.stopPropagation(); stepPhotoLightbox(1); }
    });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closePhotoLightbox();
      else if (e.key === 'ArrowLeft') stepPhotoLightbox(-1);
      else if (e.key === 'ArrowRight') stepPhotoLightbox(1);
    });
  }
  return lb;
}

// Current set of images the lightbox can page through.
let _lightboxItems = [];
let _lightboxIndex = 0;
let _lightboxToken = 0;

function renderPhotoLightbox() {
  const lb = getPhotoLightbox();
  const item = _lightboxItems[_lightboxIndex];
  if (!item) return;
  const img = lb.querySelector('img');
  img.alt = item.alt || '';
  const multi = _lightboxItems.length > 1;
  lb.classList.toggle('has-nav', multi);
  lb.classList.toggle('has-share', !!(item.gameDate && item.photoId));
  const counter = lb.querySelector('.photo-lightbox-counter');
  if (counter) counter.textContent = multi ? `${_lightboxIndex + 1} / ${_lightboxItems.length}` : '';

  // Blur-up: show the (usually already-cached) thumbnail instantly, then swap in
  // the full image once it has decoded. A token guards against fast navigation
  // resolving an out-of-order load. Falls back to the original file on error.
  const token = ++_lightboxToken;
  if (item.thumb && img.src !== item.thumb) {
    img.classList.add('blurring');
    img.src = item.thumb;
  }
  const full = new Image();
  full.onload = () => {
    if (token !== _lightboxToken) return;
    img.src = full.src;
    img.classList.remove('blurring');
  };
  full.onerror = () => {
    if (token !== _lightboxToken) return;
    img.src = item.fallback || item.thumb || full.src;
    img.classList.remove('blurring');
  };
  full.src = item.src;
}

function stepPhotoLightbox(delta) {
  if (_lightboxItems.length < 2) return;
  const next = _lightboxIndex + delta;
  if (next >= _lightboxItems.length) {
    closePhotoLightbox();
    return;
  }
  if (next < 0) {
    _lightboxIndex = _lightboxItems.length - 1;
  } else {
    _lightboxIndex = next;
  }
  renderPhotoLightbox();
}

// Open the lightbox. Pass a single src, or an array of {src, alt} plus a start index.
function openPhotoLightbox(srcOrItems, alt, index = 0) {
  if (Array.isArray(srcOrItems)) {
    _lightboxItems = srcOrItems.filter((it) => it && it.src);
    _lightboxIndex = Math.max(0, Math.min(index, _lightboxItems.length - 1));
  } else {
    if (!srcOrItems) return;
    _lightboxItems = [{ src: srcOrItems, alt }];
    _lightboxIndex = 0;
  }
  if (!_lightboxItems.length) return;
  const lb = getPhotoLightbox();
  renderPhotoLightbox();
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}

const isMobileViewport = () => window.matchMedia('(max-width: 520px)').matches;

// On phones there's no room to expand inline, so clips play fullscreen instead.
// iOS Safari doesn't support the standard Fullscreen API on elements, but it
// does expose webkitEnterFullscreen() on <video>, so fall back to that.
function enterVideoFullscreen(video) {
  if (!video) return;
  video.play().catch(() => {});
  if (video.requestFullscreen) {
    video.setAttribute('controls', '');
    video.requestFullscreen().catch(() => {});
  } else if (video.webkitRequestFullscreen) {
    video.setAttribute('controls', '');
    video.webkitRequestFullscreen();
  } else if (video.webkitEnterFullscreen) {
    video.webkitEnterFullscreen();
  }
}

// When the user leaves element-fullscreen, drop the temporary controls again.
['fullscreenchange', 'webkitfullscreenchange'].forEach((ev) => {
  document.addEventListener(ev, () => {
    if (document.fullscreenElement || document.webkitFullscreenElement) return;
    document.querySelectorAll('video.moment-clip[controls]').forEach((v) => v.removeAttribute('controls'));
  });
});

function attachMomentExpandButtons(panel) {
  panel.querySelectorAll('.moment-clip-wrap').forEach((wrap) => {
    const photo = wrap.querySelector('img.moment-photo');
    const video = wrap.querySelector('video.moment-clip');
    const btn = wrap.querySelector('.moment-expand-btn');
    if (photo) {
      // Photos open in a full-screen lightbox (tap the image or the button).
      const open = (e) => {
        e.stopPropagation();
        openPhotoLightbox([{
          src: photo.dataset.full || photo.currentSrc || photo.getAttribute('src'),
          fallback: photo.dataset.fallback,
          thumb: photo.currentSrc || photo.getAttribute('src') || photo.dataset.src,
          alt: photo.alt,
        }], null, 0);
      };
      photo.addEventListener('click', open);
      if (btn) btn.addEventListener('click', open);
      return;
    }
    if (video) {
      // On phones, tapping the video plays it fullscreen.
      video.addEventListener('click', (e) => {
        if (!isMobileViewport()) return;
        e.stopPropagation();
        enterVideoFullscreen(video);
      });
    }
    if (!btn) return;
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      // Phones: fullscreen. Larger screens: expand inline within the panel.
      if (isMobileViewport()) {
        enterVideoFullscreen(video);
        return;
      }
      const expanded = wrap.classList.toggle('expanded');
      btn.setAttribute('aria-expanded', expanded ? 'true' : 'false');
      const label = `${expanded ? 'Collapse' : 'Expand'} video`;
      btn.setAttribute('aria-label', label);
      btn.title = label;
    });
  });
}

async function copyOrShare(url, title, text, btn) {
  try {
    if (navigator.share) {
      await navigator.share({ title, text, url });
    } else {
      await navigator.clipboard.writeText(url);
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1500);
    }
  } catch (err) {
    if (err?.name === 'AbortError') return;
    try {
      await navigator.clipboard.writeText(url);
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1500);
    } catch (_) {}
  }
}

function createGameShareButton(g) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'game-share-btn';
  btn.setAttribute('aria-label', `Share game vs ${g.opp}`);
  btn.title = 'Share game';
  btn.innerHTML = '<svg viewBox="0 0 16 16" width="11" height="11" aria-hidden="true"><path fill="currentColor" d="M12 9.5a2.2 2.2 0 0 0-1.3.4l-4.2-2.4a2.4 2.4 0 0 0 0-1.8l4.2-2.4a2.2 2.2 0 0 0 1.3.4 2.25 2.25 0 1 0-2.25-2.25c0 .2 0 .4.05.6L6.5 4.55a2.25 2.25 0 1 0 0 3.9l4.15 2.35a2.2 2.2 0 0 0-.05.6 2.25 2.25 0 1 0 2.25-2.25"/></svg>';
  btn.addEventListener('click', (e) => shareGame(e, g, btn));
  return btn;
}

async function shareGame(e, g, btn) {
  e.stopPropagation();
  e.preventDefault();
  const url = gameShareUrl(g.date);
  const title = `Dark Knights vs ${g.opp}`;
  const text = g.score
    ? `${g.month} ${g.dayNum} — Final ${g.score.dk}-${g.score.opp}`
    : `${g.month} ${g.dayNum} — ${g.start}, ${g.venue}`;
  await copyOrShare(url, title, text, btn);
}

async function shareMoment(e, g, moment, btn) {
  e.stopPropagation();
  e.preventDefault();
  const url = momentShareUrl(g.date, moment._momentId);
  const title = `${displayPlayerName(moment.player)} — Dark Knights vs ${g.opp}`;
  const when = moment.afterPeriod
    ? `after ${moment.afterPeriod} period`
    : moment.time
    ? `${moment.period} ${moment.time}`
    : moment.period;
  const fallbackLabel = moment.photo ? 'Photo' : 'Moment highlight';
  const text = moment.description
    ? `${g.month} ${g.dayNum}, ${when} — ${moment.description}`
    : `${g.month} ${g.dayNum}, ${when} — ${fallbackLabel}`;
  await copyOrShare(url, title, text, btn);
}

async function shareCurrentLightboxPhoto(btn) {
  const item = _lightboxItems[_lightboxIndex];
  if (!item?.gameDate || !item?.photoId) return;
  const g = games.find((game) => game.date === item.gameDate);
  if (!g) return;
  const url = galleryPhotoShareUrl(item.gameDate, item.photoId);
  const title = `Dark Knights vs ${g.opp}`;
  const text = `${g.month} ${g.dayNum} — Game photo ${_lightboxIndex + 1}`;
  await copyOrShare(url, title, text, btn);
}

function highlightSharedMoment(momentId) {
  const el = document.getElementById(`moment-${momentId}`);
  if (!el) return;
  el.classList.add('moment-highlight');
  setTimeout(() => el.classList.remove('moment-highlight'), 1600);
}

function scrollToSharedTarget(date, momentId) {
  const wrap = document.getElementById(`game-${date}`);
  if (!wrap) return false;

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const momentEl = momentId ? document.getElementById(`moment-${momentId}`) : null;
  const target = momentEl || wrap;

  target.scrollIntoView({
    behavior: reducedMotion ? 'auto' : 'smooth',
    block: momentEl ? 'center' : 'start',
  });

  if (momentEl) highlightSharedMoment(momentId);
  return !!momentEl;
}

function openSharedGalleryPhoto(date, photoId) {
  const g = games.find((game) => game.date === date);
  if (!g) return false;
  const items = buildGalleryLightboxItems(g);
  const index = items.findIndex((item) => item.photoId === photoId);
  if (index < 0) return false;
  openPhotoLightbox(items, null, index);
  return true;
}

function openSharedGame(date, { scroll = true, momentId = null, photoId = null } = {}) {
  const wrap = document.getElementById(`game-${date}`);
  if (!wrap) return false;

  const card = wrap.querySelector('.game-card');
  const panel = wrap.querySelector('.game-goals-panel');

  if (card?.classList.contains('has-goals-toggle') && panel) {
    wrap.classList.add('expanded');
    panel.classList.add('open');
    setMomentClipsPlaying(panel, true);
    card.setAttribute('aria-expanded', 'true');
  }

  if (scroll) {
    const runScroll = (attempt = 0) => {
      const scrolledToMoment = scrollToSharedTarget(date, momentId);
      if (!momentId || scrolledToMoment || attempt >= 4) return;
      setTimeout(() => runScroll(attempt + 1), 80);
    };

    requestAnimationFrame(() => {
      requestAnimationFrame(() => runScroll());
    });
  }

  if (photoId) {
    const openPhoto = (attempt = 0) => {
      if (openSharedGalleryPhoto(date, photoId)) return;
      if (attempt < 8) setTimeout(() => openPhoto(attempt + 1), 80);
    };
    requestAnimationFrame(() => {
      requestAnimationFrame(() => openPhoto());
    });
  }

  return true;
}

function initSharedGameLink() {
  const momentId = getSharedMomentId();
  const photoId = getSharedPhotoId();
  let date = getSharedGameDate();
  if (!date && momentId) date = findGameDateForMoment(momentId);
  if (!date && photoId) date = findGameDateForGalleryPhoto(photoId);
  if (!date) return;

  const tryOpen = (attempt = 0) => {
    if (openSharedGame(date, { momentId, photoId })) return;
    if (attempt < 20) setTimeout(() => tryOpen(attempt + 1), 50);
  };

  tryOpen();
}

games.forEach((g, i) => {
  if (g.month !== currentMonth) {
    currentMonth = g.month;
    const label = document.createElement('div');
    label.className = 'month-label';
    label.textContent = currentMonth;
    if (i > 0) label.style.marginTop = '12px';
    schedule.appendChild(label);
  }

  const gd = new Date(g.date + 'T00:00:00');
  const isPast = gd < today || g.score;
  const isNext = i === nextGameIdx && !g.score;

  const wrap = document.createElement('div');
  wrap.className = 'game-wrap';
  wrap.id = `game-${g.date}`;
  wrap.style.animationDelay = `${i * 0.04}s`;

  const card = document.createElement('div');
  card.className = `game-card ${g.ha}${isPast ? ' past' : ''}${isNext ? ' next-game' : ''}`;

  let timeOrScoreHtml = `
    <div class="game-time">
      <div class="time-start">${g.start}</div>
      <div class="time-end">– ${g.end}</div>
    </div>
  `;

  if (g.score) {
    const isWin = g.score.dk > g.score.opp;
    const isLoss = g.score.dk < g.score.opp;

    const resultText = isWin ? 'WIN' : (isLoss ? 'LOSS' : 'TIE');
    const resultClass = isWin ? 'result-win' : (isLoss ? 'result-loss' : 'result-tie');

    const photosHtml = g.photos ? `<a href="${g.photos}" target="_blank" rel="noopener noreferrer" class="game-photos-link">Photos ↗</a>` : '';

    timeOrScoreHtml = `
      <div class="game-score">
        <div class="score-result ${resultClass}">${resultText}</div>
        <div class="score-numbers">${g.score.dk} - ${g.score.opp}</div>
        ${photosHtml}
      </div>
    `;
  }

  const toggleHint = g.score ? buildGameToggleHint(g) : '';

  if (toggleHint) {
    card.classList.add('has-goals-toggle');
    card.setAttribute('tabindex', '0');
    card.setAttribute('role', 'button');
    card.setAttribute('aria-expanded', 'false');
    const mediaSummary = gameMediaSummary(g, { lowercase: true });
    const ariaDetail = mediaSummary
      ? `Show goals, ${mediaSummary}`
      : 'Show goals';
    card.setAttribute('aria-label', `${ariaDetail}: ${g.month} ${g.dayNum} vs ${g.opp}`);
    const panel = buildGoalsPanel(g);
    card.setAttribute('aria-controls', panel.id);

    card.addEventListener('click', (e) => {
      if (e.target.closest('a[href]') || e.target.closest('.game-share-btn')) return;
      const open = !wrap.classList.contains('expanded');
      wrap.classList.toggle('expanded', open);
      panel.classList.toggle('open', open);
      setMomentClipsPlaying(panel, open);
      card.setAttribute('aria-expanded', open ? 'true' : 'false');
      if (!open) card.blur();
    });

    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        if (e.target.closest('a[href]') || e.target.closest('.game-share-btn')) return;
        e.preventDefault();
        card.click();
      }
    });

    card.innerHTML = `
    <div class="game-date">
      <div class="day-num">${g.dayNum}</div>
      <div class="day-name">${g.dayName}</div>
    </div>
    <div class="game-info">
      <div class="game-opponent">vs ${g.opp}</div>
      <div class="game-meta">
        <span class="tag ${g.ha === 'home' ? 'tag-home' : 'tag-away'}">${g.ha}</span>
        <span class="game-venue ${g.vclass}"><span class="venue-dot"></span>${g.venue}</span>
      </div>
    </div>
    ${timeOrScoreHtml}
    ${toggleHint}
  `;

    card.appendChild(createGameShareButton(g));
    wrap.appendChild(card);
    wrap.appendChild(panel);
    schedule.appendChild(wrap);
    return;
  }

  card.innerHTML = `
    <div class="game-date">
      <div class="day-num">${g.dayNum}</div>
      <div class="day-name">${g.dayName}</div>
    </div>
    <div class="game-info">
      <div class="game-opponent">vs ${g.opp}</div>
      <div class="game-meta">
        <span class="tag ${g.ha === 'home' ? 'tag-home' : 'tag-away'}">${g.ha}</span>
        ${isNext ? `<img src="assets/${g.ha === 'home' ? 'darkjersey' : 'whitejersey'}.png" style="width:20px;height:20px;vertical-align:middle;margin-left:6px;border-radius:3px;" alt="${g.ha} jersey logo">` : ''}
        <span class="game-venue ${g.vclass}"><span class="venue-dot"></span>${g.venue}</span>
      </div>
    </div>
    ${timeOrScoreHtml}
  `;

  wrap.appendChild(card);
  schedule.appendChild(wrap);
});

function scrollToNextGame() {
  if (getSharedGameDate() || getSharedMomentId() || getSharedPhotoId()) return;
  if (nextGameIdx === -1) return;
  const el = document.querySelector('.game-card.next-game')?.closest('.game-wrap');
  if (!el) return;

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const introDelay = reducedMotion ? 0 : 700;

  setTimeout(() => {
    el.scrollIntoView({
      behavior: reducedMotion ? 'auto' : 'smooth',
      block: 'center',
    });
    if (!reducedMotion) {
      el.classList.add('scroll-reveal');
      setTimeout(() => el.classList.remove('scroll-reveal'), 3500);
    }
  }, introDelay);
}

if (getSharedGameDate() || getSharedMomentId() || getSharedPhotoId()) {
  initSharedGameLink();
} else {
  requestAnimationFrame(() => requestAnimationFrame(scrollToNextGame));
}

window.addEventListener('hashchange', () => initSharedGameLink());
window.addEventListener('popstate', () => initSharedGameLink());
</script>
</body>
</html>
